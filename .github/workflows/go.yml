name: Wails Multi-Platform Build

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc
          sudo ln -sf /usr/include/webkitgtk-4.1 /usr/include/webkitgtk-4.0

      - name: Build for amd64
        run: |
          cd frontend && npm install && cd ..
          wails build \
            -platform linux/amd64 \
            -o linux-amd64 \
            -ldflags '-s -w' \
            -clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: build/bin/linux-amd64
          if-no-files-found: warn

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build with Docker for arm64
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v $(pwd):/build \
            -w /build \
            -u $(id -u):$(id -g) \
            ubuntu:22.04 \
            bash -c "
              apt-get update && \
              apt-get install -y curl git gcc g++ make pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev && \
              ln -sf /usr/lib/aarch64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/aarch64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc && \
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && \
              apt-get install -y nodejs && \
              curl -fsSL https://go.dev/dl/go1.23.0.linux-arm64.tar.gz | tar -C /usr/local -xz && \
              export PATH=/usr/local/go/bin:/root/go/bin:\$PATH && \
              go install github.com/wailsapp/wails/v2/cmd/wails@latest && \
              cd frontend && npm install && cd .. && \
              wails build -platform linux/arm64 -o linux-arm64 -ldflags '-s -w' -clean
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: build/bin/linux-arm64
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'windows-amd64'
            platform: 'windows/amd64'
          - name: 'windows-arm64'
            platform: 'windows/arm64'
          - name: 'windows-386'
            platform: 'windows/386'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          cd ..

      - name: Build Windows ${{ matrix.name }}
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows/arm64" ]]; then
            export GOARM=7
          fi
          
          wails build \
            -platform ${{ matrix.platform }} \
            -o ${{ matrix.name }}.exe \
            -ldflags '-s -w' \
            -clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: build/bin/${{ matrix.name }}.exe
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'macos-amd64'
            platform: 'darwin/amd64'
          - name: 'macos-arm64'
            platform: 'darwin/arm64'
          - name: 'macos-universal'
            platform: 'darwin/universal'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Wails
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          cd ..

      - name: Build macOS ${{ matrix.name }}
        run: |
          wails build \
            -platform ${{ matrix.platform }} \
            -o ${{ matrix.name }} \
            -ldflags '-s -w' \
            -clean

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: build/bin/*.app
          if-no-files-found: warn

  release:
    needs: [build-linux-amd64, build-linux-arm64, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
